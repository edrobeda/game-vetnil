services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_API_TOKEN: ${VITE_API_TOKEN}
        VITE_PRIMARY_COLOR: ${VITE_PRIMARY_COLOR:-#005844}
        VITE_GAME_TITLE: ${VITE_GAME_TITLE:-Game Roleta}
        VITE_GAME_PREFIX: ${VITE_GAME_PREFIX:-EVT}
    container_name: ${CONTAINER_NAME:-DK_GAME_WL}
    restart: unless-stopped
    networks:
      - docker-base_default

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-DK_GAME_WL}_API
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-mydb}
      TENANT_ID: ${TENANT_ID}
      MANAGER_DB_NAME: ${MANAGER_DB_NAME:-mydb}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      MANAGER_USER: ${MANAGER_USER}
      MANAGER_PASS: ${MANAGER_PASS}
      ENTREGA_PASS: ${ENTREGA_PASS}
      QUIZ_MIN_ACERTOS: ${QUIZ_MIN_ACERTOS:-3}
      GAME_PREFIX: ${GAME_PREFIX:-EVT}
    networks:
      - docker-base_default
      - eventify_network

networks:
  docker-base_default:
    external: true
  eventify_network:
    external: true
